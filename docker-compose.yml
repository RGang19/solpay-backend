services:
  backend:
    build:
      context: .
      target: development
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - /app/node_modules # Don't overwrite node_modules with local ones
    environment:
      - NODE_ENV=development
    restart: always

# To run in production mode instead:
#   docker compose build --target runner
#   docker compose up
