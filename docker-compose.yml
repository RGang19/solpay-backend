services:
  backend:
    build:
      context: .
      target: development
    working_dir: /app
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules # Anonymous volume to preserve container node_modules
    environment:
      - NODE_ENV=development
    restart: always

# Command to rebuild and start:
#   docker compose up --build
