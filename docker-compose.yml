services:
  backend:
    build: .
    working_dir: /app
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    # Volumes removed to ensure the container uses the code built into its image.
    environment:
      - NODE_ENV=development
    restart: always

# Command to rebuild and start:
#   docker compose up --build
