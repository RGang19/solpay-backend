services:
  backend:
    build:
      context: .
      target: development
    working_dir: /app
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    volumes:
      # Explicit mappings because '.' mount is failing to sync 'src' on your Mac
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./prisma.config.ts:/app/prisma.config.ts
      - ./Dockerfile:/app/Dockerfile
      - ./docker-compose.yml:/app/docker-compose.yml
      # Keep container's node_modules
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: always

# Command to rebuild and start:
#   docker compose up --build
